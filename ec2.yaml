AWSTemplateFormatVersion: '2010-09-09'
Description: Simple EC2 instance using CloudFormation

Parameters:
  KeyName:
    Type: String
    Description: Existing EC2 KeyPair name

  InstanceType:
    Type: String
    Default: t3.micro

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-07216ac99dc46a187   # change based on region
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroups:
        - !Ref InstanceSG

  InstanceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
